services:
  database:
    image: postgres:17.10
    environment:
      POSTGRES_DB: classdir
      POSTGRES_USER: classdir
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U classdir"]
      interval: 5s
      retries: 5

  migrate:
    build: .
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://classdir:${DB_PASSWORD}@database:5432/classdir?sslmode=disable

volumes:
  pgdata:
